{% extends 'layout/templates.html' %} {% block content %}

<!-- Header status -->
<div class="card card-outline mb-3" id="card-header-status">
  <div class="card-body py-3">
    <div class="d-flex justify-content-between align-items-center flex-wrap">
      <div>
        <h5 class="mb-1 font-weight-bold" id="d-judul">—</h5>
        <span class="text-muted small">
          <i class="fas fa-calendar-alt mr-1"></i>
          <span id="d-tgl">—</span>
          &nbsp;·&nbsp;
          <i class="fas fa-tag mr-1"></i>
          <span id="d-kategori">—</span>
        </span>
      </div>
      <div class="mt-2 mt-md-0">
        <span
          id="d-badge-status"
          class="badge px-3 py-2"
          style="font-size: 0.85rem"
        ></span>
      </div>
    </div>

    <!-- Progress bar timeline -->
    <div class="mt-3" id="wrap-timeline"></div>
  </div>
</div>

<!-- Detail pengaduan -->
<div class="card mb-3">
  <div class="card-header">
    <h3 class="card-title">
      <i class="fas fa-file-alt mr-1"></i> Detail Pengaduan
    </h3>
  </div>
  <div class="card-body">
    <div class="row mb-3">
      <div class="col-sm-4 mb-2">
        <small class="text-muted d-block">Lokasi</small>
        <span id="d-lokasi" class="font-weight-bold">—</span>
      </div>
      <div class="col-sm-4 mb-2">
        <small class="text-muted d-block">Prioritas</small>
        <span id="d-prioritas">—</span>
      </div>
      <div class="col-sm-4 mb-2">
        <small class="text-muted d-block">Petugas</small>
        <span id="d-petugas">—</span>
      </div>
      <div class="col-sm-4 mb-2">
        <small class="text-muted d-block">Tgl Selesai</small>
        <span id="d-selesai">—</span>
      </div>
    </div>

    <hr />

    <h6 class="font-weight-bold">
      <i class="fas fa-align-left mr-1"></i> Deskripsi
    </h6>
    <p id="d-deskripsi" class="text-muted" style="white-space: pre-line">—</p>

    <!-- Lampiran -->
    <div id="section-lampiran" style="display: none">
      <hr />
      <h6 class="font-weight-bold">
        <i class="fas fa-paperclip mr-1"></i> Lampiran
      </h6>
      <div id="list-lampiran" class="d-flex flex-wrap gap-2"></div>
    </div>
  </div>
</div>

<!-- Komentar -->
<div class="card">
  <div class="card-header">
    <h3 class="card-title">
      <i class="fas fa-comments mr-1"></i> Diskusi & Update
    </h3>
  </div>
  <div class="card-body p-0">
    <div
      id="list-komentar"
      style="max-height: 420px; overflow-y: auto; padding: 1rem"
    >
      <div class="text-center py-3 text-muted">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
    </div>
  </div>

  <!-- Form komentar warga -->
  <div class="card-footer" id="wrap-form-komentar">
    <div class="input-group">
      <textarea
        id="input-komentar"
        class="form-control"
        rows="2"
        placeholder="Tulis komentar atau pertanyaan..."
      ></textarea>
      <div class="input-group-append">
        <button id="btn-kirim" class="btn btn-primary">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
    <small class="text-muted">Tekan Ctrl+Enter untuk kirim.</small>
  </div>
</div>

<!-- Tombol kembali -->
<div class="mt-3">
  <a href="/warga/pengaduan" class="btn btn-default btn-sm">
    <i class="fas fa-arrow-left mr-1"></i> Kembali ke Riwayat
  </a>
</div>

{% endblock %} {% block js %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const pathParts = window.location.pathname.split("/");
    const pengaduanId = pathParts[pathParts.length - 1];

    const PRIO = {
      1: { label: "Rendah", cls: "badge-secondary" },
      2: { label: "Sedang", cls: "badge-warning" },
      3: { label: "Tinggi", cls: "badge-danger" },
    };

    function fmtTgl(str) {
      if (!str) return "—";
      return new Date(str).toLocaleDateString("id-ID", {
        day: "2-digit",
        month: "short",
        year: "numeric",
      });
    }

    function fmtWaktu(str) {
      if (!str) return "—";
      return new Date(str).toLocaleString("id-ID", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    /* ══════════════════════════════════════
     1. LOAD DETAIL
  ══════════════════════════════════════ */
    function loadDetail() {
      fetch(`/api/warga/pengaduan/${pengaduanId}`)
        .then((r) => r.json())
        .then((p) => {
          document.title = p.judul;

          document.getElementById("d-judul").textContent = p.judul;
          document.getElementById("d-kategori").textContent = p.kategori;
          document.getElementById("d-tgl").textContent = fmtTgl(p.dibuat_pada);
          document.getElementById("d-lokasi").textContent = p.lokasi || "—";
          document.getElementById("d-deskripsi").textContent = p.deskripsi;
          document.getElementById("d-selesai").textContent = fmtTgl(
            p.diselesaikan_pada,
          );
          document.getElementById("d-petugas").textContent =
            p.unit_petugas || "Belum ditugaskan";

          // Prioritas
          const prio = PRIO[p.prioritas] || PRIO[2];
          document.getElementById("d-prioritas").innerHTML =
            `<span class="badge ${prio.cls}">${prio.label}</span>`;

          // Badge status
          const badge = document.getElementById("d-badge-status");
          badge.textContent = p.status;
          badge.style.background = p.warna_status;
          badge.style.color = "#fff";

          // Card border
          document.getElementById("card-header-status").style.borderTopColor =
            p.warna_status;

          // Timeline
          renderTimeline(p.status_kode);

          // Lampiran
          if (p.lampiran && p.lampiran.length) {
            document.getElementById("section-lampiran").style.display = "";
            const cont = document.getElementById("list-lampiran");
            p.lampiran.forEach((l) => {
              const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(l.nama_file);
              cont.insertAdjacentHTML(
                "beforeend",
                `
              <a href="${l.url_file}" target="_blank"
                 class="btn btn-sm btn-outline-secondary mr-1 mb-1">
                <i class="fas fa-${isImg ? "image" : "file"} mr-1"></i>
                ${l.nama_file}
              </a>`,
              );
            });
          }

          // Sembunyikan form komentar jika sudah selesai/ditolak
          if (["SELESAI", "DITOLAK"].includes(p.status_kode)) {
            document.getElementById("wrap-form-komentar").style.display =
              "none";
          }
        });
    }

    /* ── Render progress timeline ── */
    function renderTimeline(kode) {
      const steps = [
        {
          kode: "MASUK",
          label: "Masuk",
          icon: "fas fa-inbox",
          warna: "#3B82F6",
        },
        {
          kode: "VERIFIKASI",
          label: "Verifikasi",
          icon: "fas fa-check-double",
          warna: "#8B5CF6",
        },
        {
          kode: "PROSES",
          label: "Diproses",
          icon: "fas fa-spinner",
          warna: "#F59E0B",
        },
        {
          kode: "SELESAI",
          label: "Selesai",
          icon: "fas fa-check-circle",
          warna: "#10B981",
        },
      ];

      const wrap = document.getElementById("wrap-timeline");

      if (kode === "DITOLAK") {
        wrap.innerHTML = `
        <div class="alert alert-danger mb-0 py-2">
          <i class="fas fa-times-circle mr-1"></i>
          Pengaduan ini telah <strong>ditolak</strong>.
          Hubungi admin untuk informasi lebih lanjut.
        </div>`;
        return;
      }

      const idxAktif = steps.findIndex((s) => s.kode === kode);
      const pct =
        idxAktif < 0 ? 0 : Math.round((idxAktif / (steps.length - 1)) * 100);

      let html = `
      <div class="progress mb-2" style="height:6px;">
        <div class="progress-bar bg-success" style="width:${pct}%;transition:width .8s;"></div>
      </div>
      <div class="d-flex justify-content-between">`;

      steps.forEach((s, i) => {
        const done = i <= idxAktif;
        const aktif = i === idxAktif;
        const color = done ? s.warna : "#D1D5DB";
        html += `
        <div class="text-center flex-fill">
          <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center mb-1"
               style="width:32px;height:32px;background:${color};
                      box-shadow:${aktif ? "0 0 0 3px " + s.warna + "44" : "none"};">
            <i class="${s.icon} text-white" style="font-size:.75rem;"></i>
          </div>
          <small style="color:${color};font-size:.7rem;font-weight:${aktif ? "bold" : "normal"};">
            ${s.label}
          </small>
        </div>`;
      });

      html += `</div>`;
      wrap.innerHTML = html;
    }

    /* ══════════════════════════════════════
     2. KOMENTAR
  ══════════════════════════════════════ */
    function loadKomentar() {
      const cont = document.getElementById("list-komentar");
      cont.innerHTML = `<div class="text-center py-3"><i class="fas fa-spinner fa-spin"></i></div>`;

      fetch(`/api/pengaduan/${pengaduanId}/komentar?mode=publik`)
        .then((r) => r.json())
        .then((rows) => {
          cont.innerHTML = "";

          if (!rows.length) {
            cont.innerHTML = `<p class="text-muted text-center py-3">Belum ada komentar.</p>`;
            return;
          }

          rows.forEach((k) => {
            const milikSaya = k.peran === "warga";
            const align = milikSaya ? "flex-row-reverse" : "";
            const bgCls = milikSaya ? "bg-primary text-white" : "bg-light";
            const inisial = k.nama[0].toUpperCase();

            cont.insertAdjacentHTML(
              "beforeend",
              `
            <div class="d-flex ${align} mb-3">
              <div class="${milikSaya ? "ml-2" : "mr-2"} flex-shrink-0">
                <div class="rounded-circle bg-${milikSaya ? "primary" : "secondary"}
                            text-white d-flex align-items-center justify-content-center"
                     style="width:36px;height:36px;font-size:.8rem;">
                  ${inisial}
                </div>
              </div>
              <div style="max-width:75%;">
                <div class="rounded p-2 px-3 ${bgCls}" style="word-break:break-word;">
                  <p class="mb-1" style="white-space:pre-line;">${k.isi}</p>
                </div>
                <small class="text-muted ${milikSaya ? "d-block text-right" : ""}">
                  ${k.nama} · ${fmtWaktu(k.dibuat_pada)}
                </small>
              </div>
            </div>`,
            );
          });

          cont.scrollTop = cont.scrollHeight;
        });
    }

    /* kirim komentar */
    function kirimKomentar() {
      const isi = document.getElementById("input-komentar").value.trim();
      if (!isi) return;

      fetch(`/api/pengaduan/${pengaduanId}/komentar`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ isi, adalah_internal: 0 }),
      })
        .then((r) => r.json())
        .then(() => {
          document.getElementById("input-komentar").value = "";
          loadKomentar();
        })
        .catch(() => {
          if (window.toastr) toastr.error("Gagal mengirim komentar.");
        });
    }

    document
      .getElementById("btn-kirim")
      ?.addEventListener("click", kirimKomentar);
    document
      .getElementById("input-komentar")
      ?.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "Enter") kirimKomentar();
      });

    /* ── init ── */
    loadDetail();
    loadKomentar();
  });
</script>
{% endblock %}
